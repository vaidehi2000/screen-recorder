<!DOCTYPE html>
<html>
    <head>
        <title>Recording Complete</title>
        <style>
            body {
                background-color: #1a1a1a;
                color: white;
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
                margin: 0;
                box-sizing: border-box;
            }
            #previews {
                display: flex;
                gap: 20px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .preview-container {
                flex: 1;
                /* display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px; */
            }
            .preview-container video {
                width: 100%;
                height: 200px;
                max-height: 350px;
                object-fit: contain;
                background-color: #1a1a1a;
                display: block;
                border: 2px solid #555;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <h1>Recording Complete</h1>

        <div id="previews">
            <div class="preview-container">
                <p>Screen Recording</p>
                <video id="screen-preview" controls></video>
            </div>
            <div class="preview-container" id="webcam-container" style="display:none;">
                <p>Webcam Recording</p>
                <video id="webcam-preview" controls></video>
            </div>
        </div>

        <p id="duration"></p>
        <p id="location"></p>

        <button id="open-folder-btn">Open Folder</button>
        <button id="discard-btn">Discard</button>

        <script src="../../dist/renderer/review.js"></script>
