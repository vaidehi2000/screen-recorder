<!DOCTYPE html>
<html>
    <head>
        <title>Recording Complete</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background-color: #1a1a1a;
                color: white;
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
                margin: 0;
                box-sizing: border-box;
            }
            h1 {
                font-size: 20px;
                font-weight: 600;
                margin-bottom: 20px;
            }
            #previews {
                display: flex;
                gap: 20px;
                margin-bottom: 20px;
                width: 100%;
                align-items: flex-start;
                /* flex-wrap: wrap; */
                /* justify-content: center; */
            }
            .preview-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .preview-container p {
                font-size: 14px;
                color: #aaa;
                text-align: center;
            }
            .preview-container video {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
                object-fit: contain;
                background-color: #1a1a1a;
                display: block;
                border: 2px solid #555;
                border-radius: 4px;
            }
            .filename-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                /* width: auto; */
                margin-top: 5px;
            }
            .folder-row {
                display: flex;
                gap: 8px;
                /* width: auto; */
                margin-top: 5px;
            }
            .filename-row span, .folder-row span {
                font-size: 13px;
                color: #ccc;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 200px;
            }
            .folder-row p {
                font-size: 13px;
                color: #aaa;
            }
            .folder-row span {
                font-size: 13px;
                color: #ccc;
                word-break: break-all;
            }
            .edit-btn {
                background-color: #333;
                color: #aaa;
                border: none;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
            }
            .edit-btn:hover {
                background-color: #555;
                color: white
            }
            input.rename-input {
                background-color: #333;
                color: white;
                border: 1px solid #555;
                padding: 5px 10px;
                border-radius: 4px;
                width: 70%;
                font-size: 12px;
            }
            .info-section {
                display: flex;
                flex-direction: column;
                gap: 6px;
                width: 100%;
                padding: 0 4px;
            }
            .info-section p {
                font-size: 13px;
                color: #aaa;
            }
            .action-buttons {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }
            #open-folder-btn, #discard-btn {
                background-color: #0078d4;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 14px;
                border-radius: 4px;
                cursor: pointer;
            }
            #open-folder-btn:hover {
                background-color: #005a9e;
            }
            #discard-btn {
                background-color: #333;
                color: #ccc;
                border: none;
                padding: 8px 20px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
            }
            #discard-btn:hover {
                background-color: #555;
                color: white;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <h1>Recording Complete</h1>

        <div id="previews">
            <div class="preview-container">
                <p>Screen Recording</p>
                <video id="screen-preview" controls></video>
                <div class = "filename-row">
                    <span id="screen-filename"></span>
                    <button class="edit-btn" id="edit-screen-btn">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                </div>
            </div>
            <div class="preview-container hidden" id="webcam-container">
                <p>Webcam Recording</p>
                <video id="webcam-preview" controls></video>
                <div class = "filename-row">
                    <span id="webcam-filename"></span>
                    <button class="edit-btn" id="edit-webcam-btn">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="info-section">
            <div class="folder-row">
                <p>Folder Name: </p>
                <span id="folder-name"></span>
                <button class="edit-btn" id="edit-folder-btn">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>
            <p id="duration"></p>
            <p id="location"></p>
        </div>
        <div class="action-buttons">
            <button id="open-folder-btn">Open Folder</button>
            <button id="discard-btn">Discard</button>
        </div>

        <script src="../../dist/renderer/review.js"></script>
    </body>
</html>
