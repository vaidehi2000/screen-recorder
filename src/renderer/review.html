<!DOCTYPE html>
<html>
    <head>
        <title>Recording Complete</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="review.css">
    </head>
    <body>
        <h1>Recording Complete</h1>

        <div id="previews">
            <div class="preview-container">
                <p>Screen Recording</p>
                <video id="screen-preview" controls></video>
                <div class = "filename-row">
                    <span id="screen-filename"></span>
                    <button class="edit-btn" id="edit-screen-btn">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                </div>
            </div>
            <div class="preview-container hidden" id="webcam-container">
                <p>Webcam Recording</p>
                <video id="webcam-preview" controls></video>
                <div class = "filename-row">
                    <span id="webcam-filename"></span>
                    <button class="edit-btn" id="edit-webcam-btn">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="merged-container" class="hidden">
            <p>Merged Recording</p>
            <video id="merged-preview" controls></video>
            <div class = "filename-row">
                <span id="merged-filename"></span>
                <button class="edit-btn" id="edit-merged-btn">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>
        </div>
        
        <div class="info-section">
            <div class="folder-row">
                <p>Folder Name: </p>
                <span id="folder-name"></span>
                <button class="edit-btn" id="edit-folder-btn">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>
            <p id="duration"></p>
            <p id="location"></p>
        </div>
        <div class="action-buttons" id="default-actions">
            <button id="open-folder-btn">Open Folder</button>
            <button id="merge-btn" class="hidden">Merge to MP4</button>
            <button id="discard-btn">Discard</button>
        </div>

        <div class="action-buttons hidden" id="merged-actions">
            <button id="keep-merged-btn">Keep Merged Only</button>
            <button id="keep-all-btn">Keep All</button>
            <button id="discard-all-btn">Discard All</button>
        </div>

        <script src="../../dist/renderer/review.js"></script>
    </body>
</html>
