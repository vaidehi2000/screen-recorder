<!DOCTYPE html>
<html>
    <head>
        <title>Screen Recorder</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h1>Screen Recorder</h1>

        <div id="sources-list"></div>

        <div id="controls">
            <div id="toggles">
                <label>
                    <input type="checkbox" id="webcam-toggle"> Include Webcam
                </label>
                <label>
                    <input type="checkbox" id="mic-toggle" />
                    Include Microphone
                </label>
                <label>
                    <input type="checkbox" id="system-audio-toggle" />
                    Include System Audio
                </label>
            </div>
        </div>

        <video id="webcam-preview" autoplay muted></video>
        
        <div id="settings-row">
            <div id="bitrate-row">
                <label for="bitrate-input">Quality:</label>
                <select id="bitrate-input">
                    <option value="15000000">Ultra (15 Mbps)</option>
                    <option value="8000000">High (8 Mbps)</option>
                    <option value="5000000" selected>Medium (5 Mbps)</option>
                    <option value="2500000">Low (2.5 Mbps)</option>
                </select>
            </div>
        </div>
        
        <div id="save-location-row">
            <span id="save-location-display">Default: Videos/ScreenRecorder</span>
            <button id="choose-folder-btn">Change</button>
        </div>

        <div id="record-row">
            <button id="record-btn" disabled>Record</button>
            <span id="timer">00:00:00</span>
        </div>
        
        <script src="../../dist/renderer/renderer.js"></script>
    </body>
</html>
